server:
  port: 8087

spring:
  application:
    name: reconix-reporting

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:reconix_reporting}
    username: ${POSTGRES_USER:reconix}
    password: ${POSTGRES_PASSWORD:reconix123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Elasticsearch Configuration
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USER:}
    password: ${ELASTICSEARCH_PASSWORD:}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: reporting-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.reconix.reporting.dto"

  # Jackson Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# Reporting Configuration
reporting:
  pdf:
    enabled: true
    page-size: A4
  excel:
    enabled: true
    max-rows: 100000
  storage:
    path: ${REPORT_STORAGE_PATH:/tmp/reconix/reports}

# Logging
logging:
  level:
    com.reconix.reporting: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.elasticsearch: INFO
