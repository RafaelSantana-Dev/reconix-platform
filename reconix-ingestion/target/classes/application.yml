server:
  port: 8082 # Porta para o serviço de Ingestão

spring:
  application:
    name: reconix-ingestion

  # ==========================================
  # Configuração do RabbitMQ
  # ==========================================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:reconix}
    password: ${RABBITMQ_PASSWORD:reconix123}

  # ==========================================
  # Configuração para Upload de Arquivos
  # ==========================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB   # Tamanho máximo de cada arquivo
      max-request-size: 50MB # Tamanho máximo da requisição (pode incluir múltiplos arquivos)

# ==========================================
# Configuração do MinIO (S3)
# ==========================================
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:reconix}
  secret-key: ${MINIO_SECRET_KEY:reconix123}
  bucket-name: ${MINIO_BUCKET_NAME:reconix-files}

# ==========================================
# Eureka
# ==========================================
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:reconix}:${EUREKA_PASSWORD:reconix123}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ==========================================
# Actuator + Prometheus
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ==========================================
# Logging
# ==========================================
logging:
  level:
    com.reconix.ingestion: DEBUG
    org.springframework.web: INFO
    org.springframework.amqp: INFO
