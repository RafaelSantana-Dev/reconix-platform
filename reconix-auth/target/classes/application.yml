server:
  port: 8079

spring:
  application:
    name: reconix-auth

  # ==========================================
  # Banco de Dados (PostgreSQL)
  # ==========================================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reconix_db}
    username: ${DB_USER:reconix}
    password: ${DB_PASSWORD:reconix123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ==========================================
  # Flyway (Migrations)
  # ==========================================
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ==========================================
  # Keycloak OAuth2 Resource Server
  # ==========================================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/reconix}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/reconix/protocol/openid-connect/certs}

  # ==========================================
  # Redis (Cache + Rate Limiting)
  # ==========================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:reconix123}

# ==========================================
# Keycloak Admin Config
# ==========================================
keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:reconix}
  client-id: ${KEYCLOAK_CLIENT_ID:reconix-api}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:COLE_SEU_CLIENT_SECRET_AQUI}
  admin-username: ${KEYCLOAK_ADMIN_USER:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

# ==========================================
# Eureka
# ==========================================
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:reconix}:${EUREKA_PASSWORD:reconix123}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ==========================================
# Actuator + Prometheus
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ==========================================
# OpenAPI / Swagger
# ==========================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ==========================================
# Logging
# ==========================================
logging:
  level:
    com.reconix.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"