server:
  port: 8888

spring:
  application:
    name: reconix-config
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configurations

spring.security:
  user:
    name: ${CONFIG_USER:reconix}
    password: ${CONFIG_PASSWORD:reconix123}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:reconix}:${EUREKA_PASSWORD:reconix123}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}